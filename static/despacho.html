<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de OS — Hub Técnico</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0d0f14;--surface:#151920;--surface2:#1c2230;--border:#252d3d;--accent:#e8521a;--accent2:#ff6b35;--text:#e8eaf0;--muted:#6b7590;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* LOGIN */
#login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:32px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px}
.login-title{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.login-title span{color:var(--accent2)}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:24px}
.field label{display:block;font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;padding:10px 12px;outline:none;margin-bottom:12px}
.field input:focus{border-color:var(--accent)}
.btn{padding:11px 20px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-green{background:var(--green);color:#000}
.btn-sm{padding:6px 14px;font-size:.78rem}
/* APP */
#app-page{display:none;height:100vh;flex-direction:column}
/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-size:1rem;font-weight:800;margin-right:auto}
.topbar-title span{color:var(--accent2)}
/* FILTROS */
.filtro-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.filtro-btn.active{border-color:var(--accent);color:var(--accent2);background:rgba(232,82,26,.1)}
.filtro-btn .badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:.68rem}
/* LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:320px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.sidebar-body{flex:1;overflow-y:auto}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border)}
/* OS ITEMS */
.os-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.os-item:hover{background:var(--surface2)}
.os-item.selected{background:rgba(232,82,26,.08);border-left:3px solid var(--accent)}
.os-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.os-num{font-size:.72rem;color:var(--muted)}
.os-status-badge{padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700}
.badge-pendente{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-deslocamento{background:rgba(59,130,246,.15);color:var(--blue)}
.badge-execucao{background:rgba(34,197,94,.15);color:var(--green)}
.badge-finalizada{background:rgba(107,117,144,.15);color:var(--muted)}
.os-cliente{font-size:.88rem;font-weight:700;margin-bottom:2px}
.os-end{font-size:.75rem;color:var(--muted);margin-bottom:4px}
.os-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted)}
/* MAPA */
#mapa{flex:1}
/* PAINEL LATERAL DIREITO */
.detail-panel{width:300px;background:var(--surface);border-left:1px solid var(--border);display:none;flex-direction:column;overflow-y:auto}
.detail-panel.open{display:flex}
.detail-head{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.detail-title{font-size:.92rem;font-weight:800}
.detail-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
.detail-body{padding:14px;flex:1}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.detail-row:last-child{border-bottom:none}
.detail-row label{color:var(--muted)}
/* STATS BAR */
.stats-bar{display:flex;gap:16px;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{display:flex;align-items:center;gap:6px;font-size:.8rem}
.stat-num{font-weight:900;font-size:1rem}
.stat-num.r{color:var(--red)}.stat-num.y{color:var(--yellow)}.stat-num.g{color:var(--green)}.stat-num.b{color:var(--blue)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;max-width:420px;width:100%}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between}
.tecnico-option{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s}
.tecnico-option:hover{border-color:var(--accent);background:rgba(232,82,26,.08)}
.tecnico-option.best{border-color:var(--green);background:rgba(34,197,94,.08)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 18px;font-size:.85rem;font-weight:600;z-index:9999}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-title">Hub<span>Técnico</span></div>
    <div class="login-sub">Controle de OS — Cliquedf</div>
    <div class="field">
      <label>Login</label>
      <input type="text" id="inp-login" placeholder="login">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <div id="login-err" style="color:var(--red);font-size:.8rem;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-page">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Hub<span>Técnico</span> — Controle de OS</div>
    <div id="tb-hora" style="font-size:.8rem;color:var(--muted)">—</div>
    <div style="display:flex;gap:4px;align-items:center">
      <span style="font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase">Status:</span>
      <button class="filtro-btn active" id="f-pendente" onclick="toggleStatus('pendente',this)">🔴 Pendentes <span class="badge" id="cnt-pendente">0</span></button>
      <button class="filtro-btn active" id="f-deslocamento" onclick="toggleStatus('deslocamento',this)">🟡 Deslocamento <span class="badge" id="cnt-deslocamento">0</span></button>
      <button class="filtro-btn active" id="f-agendada" onclick="toggleStatus('agendada',this)">📅 Agendada <span class="badge" id="cnt-agendada">0</span></button>
      <button class="filtro-btn active" id="f-execucao" onclick="toggleStatus('execucao',this)">🔵 Execução <span class="badge" id="cnt-execucao">0</span></button>
      <button class="filtro-btn" id="f-finalizada" onclick="toggleStatus('finalizada',this)">✅ Finalizadas <span class="badge" id="cnt-finalizada">0</span></button>
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <span style="font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase">Tipo:</span>
      <button class="filtro-btn active" id="ft-suporte" onclick="toggleTipo('suporte',this)">🔧 Suporte</button>
      <button class="filtro-btn active" id="ft-instalacao" onclick="toggleTipo('instalacao',this)">⚡ Serviço</button>
      <button class="filtro-btn active" id="ft-infra" onclick="toggleTipo('infra',this)">🏗️ Infra</button>
      <button class="filtro-btn active" id="ft-retirada" onclick="toggleTipo('retirada',this)">📦 Retirada</button>
      <button class="filtro-btn active" id="ft-instalacao2" onclick="toggleTipo('instalacao',this)" style="display:none"></button>
      <button class="filtro-btn active" id="ft-default" onclick="toggleTipo('default',this)">📋 Outros</button>
    </div>
    <div style="display:flex;gap:4px;align-items:center;margin-left:auto">
      <button class="filtro-btn active" id="f-tecnicos" onclick="toggleTecnicos(this)">🚗 Técnicos</button>
      <input type="date" id="filtro-data-ini" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 8px;font-size:.78rem;outline:none" onchange="renderSidebar();renderMapa()">
      <span style="color:var(--muted);font-size:.78rem">até</span>
      <input type="date" id="filtro-data-fim" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 8px;font-size:.78rem;outline:none" onchange="renderSidebar();renderMapa()">
      <button class="btn btn-sm btn-outline" onclick="limparDatas()">✕ Data</button>
      <button class="btn btn-sm btn-outline" onclick="carregarDados()">↻</button>
      <button class="btn btn-sm btn-outline" onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-num r" id="st-pendente">0</span> Pendentes</div>
    <div class="stat"><span class="stat-num y" id="st-deslocamento">0</span> Deslocamento</div>
    <div class="stat"><span class="stat-num" style="color:#a855f7" id="st-agendada">0</span> Agendada</div>
    <div class="stat"><span class="stat-num b" id="st-execucao">0</span> Execução</div>
    <div class="stat"><span class="stat-num g" id="st-finalizada">0</span> Finalizadas</div>
    <div class="stat" style="margin-left:auto"><span class="stat-num" id="st-tecnicos">0</span> Técnicos ativos</div>
  </div>

  <!-- LAYOUT PRINCIPAL -->
  <div class="main-layout">
    <!-- SIDEBAR OS -->
    <div class="sidebar">
      <div class="sidebar-head">OS do dia</div>
      <div class="sidebar-body" id="lista-os"></div>
    </div>

    <!-- MAPA -->
    <div id="mapa"></div>

    <!-- PAINEL DETALHE -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-head">
        <div class="detail-title" id="detail-title">Detalhes</div>
        <button class="detail-close" onclick="fecharDetalhe()">✕</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>
</div>

<!-- MODAL ATRIBUIR -->
<div class="modal-bg" id="modal-atribuir" style="display:none">
  <div class="modal">
    <div class="modal-title">
      <span>👷 Atribuir OS</span>
      <button onclick="fecharModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem">✕</button>
    </div>
    <div id="modal-os-info" style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:14px;font-size:.85rem"></div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px;font-weight:700">TÉCNICOS DISPONÍVEIS</div>
    <div id="lista-tecnicos-modal"></div>
  </div>
</div>

<script>
// ── ESTADO ──────────────────────────────────────────────────
let usuario = null;
let mapa = null;
let marcadores = {};
let marcadoresTec = {};
let osCache = [];
let tecnicosCache = [];
let filtros = new Set(['pendente','deslocamento','execucao','tecnicos']);
let osAtribuirId = null;

// ── AUTH ─────────────────────────────────────────────────────
function token() { return localStorage.getItem('ht_despacho_token') || ''; }

function api(path, opts={}) {
  return fetch(path, {
    ...opts,
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token(),...(opts.headers||{})}
  }).then(r=>r.json());
}

async function fazerLogin() {
  const login = document.getElementById('inp-login').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const err = document.getElementById('login-err');
  try {
    const r = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,senha})}).then(r=>r.json());
    if (r.detail){err.textContent=r.detail;err.style.display='block';return;}
    if (r.usuario.nivel < 50){err.textContent='Acesso restrito ao supervisor';err.style.display='block';return;}
    localStorage.setItem('ht_despacho_token', r.token);
    localStorage.setItem('ht_despacho_usuario', JSON.stringify(r.usuario));
    usuario = r.usuario;
    iniciarApp();
  } catch(e){err.textContent='Erro de conexão';err.style.display='block';}
}

function logout(){localStorage.removeItem('ht_despacho_token');location.reload();}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const t = localStorage.getItem('ht_despacho_token');
  const u = localStorage.getItem('ht_despacho_usuario');
  if (t && u) { usuario=JSON.parse(u); iniciarApp(); }
  setInterval(()=>{
    const now = new Date();
    document.getElementById('tb-hora').textContent = now.toLocaleTimeString('pt-BR');
  }, 1000);
});

function iniciarApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'flex';
  iniciarMapa();
  carregarDados();
  setInterval(carregarDados, 15000);
}

// ── MAPA ─────────────────────────────────────────────────────
function iniciarMapa() {
  mapa = L.map('mapa').setView([-15.7942, -47.8825], 12);
  // Legenda
  const legenda = L.control({position:'bottomleft'});
  legenda.onAdd = () => {
    const div = L.DomUtil.create('div');
    div.innerHTML = `<div style="background:#151920;border:1px solid #252d3d;border-radius:10px;padding:10px 14px;font-family:sans-serif;font-size:12px;color:#e8eaf0">
      <div style="font-weight:700;margin-bottom:8px;color:#6b7590;text-transform:uppercase;letter-spacing:.05em">Tipos de OS</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div>🔧 <span style="color:#3b82f6">Suporte</span></div>
        <div>⚡ <span style="color:#22c55e">Serviço</span></div>
        <div>🏗️ <span style="color:#f59e0b">Infra</span></div>
        <div>📦 <span style="color:#a855f7">Retirada</span></div>
        <div>📋 <span style="color:#6b7590">Outros</span></div>
      </div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #252d3d;font-weight:700;color:#6b7590;text-transform:uppercase;letter-spacing:.05em">Status</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:5px">
        <div><span style="color:#ef4444">●</span> Pendente</div>
        <div><span style="color:#f59e0b">●</span> Deslocamento</div>
        <div><span style="color:#3b82f6">●</span> Execução</div>
        <div><span style="color:#22c55e">●</span> Finalizada</div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid #252d3d"><span style="color:#ef4444">🔴</span> SLA Estourado</div>
      </div>
    </div>`;
    return div;
  };
  legenda.addTo(mapa);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap', maxZoom:19
  }).addTo(mapa);
}

// Mapeamento assunto → tipo (baseado na planilha Cliquedf)
const ASSUNTO_TIPO = {
  // suporte (cliente com problema)
  1:'suporte',5:'suporte',9:'suporte',17:'suporte',20:'suporte',21:'suporte',
  44:'suporte',47:'suporte',53:'suporte',54:'suporte',91:'suporte',
  101:'suporte',102:'suporte',103:'suporte',104:'suporte',105:'suporte',
  107:'suporte',113:'suporte',203:'suporte',226:'suporte',
  // instalacao/servico
  2:'instalacao',3:'instalacao',4:'instalacao',8:'instalacao',14:'instalacao',
  15:'instalacao',18:'instalacao',19:'instalacao',22:'instalacao',26:'instalacao',
  27:'instalacao',28:'instalacao',29:'instalacao',30:'instalacao',39:'instalacao',
  48:'instalacao',49:'instalacao',68:'instalacao',89:'instalacao',
  101:'instalacao',110:'instalacao',111:'instalacao',127:'instalacao',
  220:'instalacao',227:'instalacao',239:'instalacao',246:'instalacao',
  // infra/estrutura
  6:'infra',7:'infra',16:'infra',40:'infra',138:'infra',140:'infra',141:'infra',
  142:'infra',143:'infra',144:'infra',145:'infra',146:'infra',147:'infra',
  148:'infra',149:'infra',150:'infra',151:'infra',152:'infra',153:'infra',
  154:'infra',155:'infra',156:'infra',157:'infra',158:'infra',159:'infra',
  160:'infra',161:'infra',162:'infra',163:'infra',164:'infra',165:'infra',
  166:'infra',167:'infra',168:'infra',169:'infra',170:'infra',171:'infra',
  172:'infra',173:'infra',174:'infra',175:'infra',176:'infra',177:'infra',
  178:'infra',179:'infra',180:'infra',181:'infra',182:'infra',183:'infra',
  184:'infra',185:'infra',186:'infra',187:'infra',188:'infra',221:'infra',
  222:'infra',223:'infra',240:'infra',241:'infra',242:'infra',243:'infra',
  244:'infra',245:'infra',247:'infra',
  // retenção
  248:'retencao',
};

const TIPO_CONFIG = {
  suporte:    { emoji:'🔧', cor:'#3b82f6', label:'Suporte'    },
  instalacao: { emoji:'⚡', cor:'#22c55e', label:'Instalação' },
  infra:      { emoji:'🏗️', cor:'#f59e0b', label:'Infra'      },
  retirada:   { emoji:'📦', cor:'#a855f7', label:'Retirada'   },
  retencao:   { emoji:'🤝', cor:'#e8521a', label:'Retenção'   },
  default:    { emoji:'📋', cor:'#6b7590', label:'OS'         },
};

const STATUS_COR = {
  pendente:'#ef4444', deslocamento:'#f59e0b',
  execucao:'#3b82f6', finalizada:'#22c55e'
};

function iconeOS(status, id_assunto, sla_estourado) {
  const tipo = ASSUNTO_TIPO[id_assunto] || 'default';
  const cfg = TIPO_CONFIG[tipo];
  const corStatus = STATUS_COR[status] || '#6b7590';
  const borda = sla_estourado ? '#ef4444' : corStatus;
  const pulse = sla_estourado ? 'animation:pulse 1s infinite' : '';
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;display:inline-block;${pulse}">
      <div style="background:${cfg.cor};border:2px solid ${borda};border-radius:8px;
           padding:2px 5px;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.5);
           white-space:nowrap;line-height:1">${cfg.emoji}${sla_estourado?'🔴':''}</div>
      <div style="position:absolute;bottom:-4px;right:-4px;width:8px;height:8px;
           border-radius:50%;background:${corStatus};border:1px solid #fff"></div>
    </div>`,
    iconSize:[36,28], iconAnchor:[18,28]
  });
}

function iconeTecnico(status) {
  const emoji = status==='atendimento'?'🔧':status==='em_rota'?'🚗':'🅿️';
  return L.divIcon({
    className:'',
    html:`<div style="background:#1c2230;border:2px solid #e8521a;border-radius:8px;padding:2px 6px;font-size:16px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.5)">${emoji}</div>`,
    iconSize:[36,28], iconAnchor:[18,14]
  });
}

// ── DADOS ─────────────────────────────────────────────────────
async function carregarDados() {
  try {
    const [dados, gps] = await Promise.all([
      api('/api/despacho/mapa'),
      api('/api/gps/posicoes')
    ]);
    osCache = dados.os || [];
    tecnicosCache = gps || [];
    atualizarStats(dados.stats || {});
    renderSidebar();
    renderMapa();
  } catch(e) { console.log('Erro ao carregar:', e); }
}

function atualizarStats(s) {
  // Contar direto do cache para precisão
  const cnt = {pendente:0, deslocamento:0, agendada:0, reagendada:0, execucao:0, finalizada:0};
  osCache.forEach(o => { if(cnt[o.status_hub]!==undefined) cnt[o.status_hub]++; });
  document.getElementById('st-pendente').textContent = cnt.pendente;
  document.getElementById('st-deslocamento').textContent = cnt.deslocamento;
  document.getElementById('st-agendada').textContent = (cnt.agendada||0)+(cnt.reagendada||0);
  document.getElementById('st-execucao').textContent = cnt.execucao;
  document.getElementById('st-finalizada').textContent = cnt.finalizada;
  document.getElementById('st-tecnicos').textContent = tecnicosCache.length;
  document.getElementById('cnt-pendente').textContent = cnt.pendente;
  document.getElementById('cnt-deslocamento').textContent = cnt.deslocamento;
  document.getElementById('cnt-agendada').textContent = (cnt.agendada||0)+(cnt.reagendada||0);
  document.getElementById('cnt-execucao').textContent = cnt.execucao;
  document.getElementById('cnt-finalizada').textContent = cnt.finalizada;
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  const dataIni = document.getElementById('filtro-data-ini')?.value;
  const dataFim = document.getElementById('filtro-data-fim')?.value;
  const filtradas = osCache.filter(o => {
    const tipo = ASSUNTO_TIPO[o.id_assunto] || 'default';
    if (!filtrosStatus.has(o.status_hub)) return false;
    if (!filtrosTipo.has(tipo)) return false;
    if (dataIni && o.data_abertura && o.data_abertura < dataIni) return false;
    if (dataFim && o.data_abertura && o.data_abertura.substring(0,10) > dataFim) return false;
    return true;
  });
  const lista = document.getElementById('lista-os');
  if (!filtradas.length) { lista.innerHTML='<div style="padding:20px;color:var(--muted);font-size:.85rem;text-align:center">Nenhuma OS</div>'; return; }
  lista.innerHTML = filtradas.map(o => `
    <div class="os-item" onclick="selecionarOS(${o.ixc_os_id})" id="osi-${o.ixc_os_id}">
      <div class="os-item-top">
        <span class="os-num">OS #${o.ixc_os_id}</span>
        <span class="os-status-badge badge-${o.status_hub}">${labelStatus(o.status_hub)}</span>
      </div>
      <div class="os-cliente">${o.cliente_nome||'—'}</div>
      <div class="os-end">📍 ${o.endereco||'—'} ${o.bairro?'· '+o.bairro:''}</div>
      <div class="os-meta" style="margin-bottom:4px">
        <span>${o.assunto_nome||'—'}</span>
        <span>${o.tecnico_nome||'Sem técnico'}</span>
      </div>
    </div>`).join('');
}

// ── MAPA MARKERS ─────────────────────────────────────────────
function renderMapa() {
  // Limpar markers antigos
  Object.values(marcadores).forEach(m => mapa.removeLayer(m));
  Object.values(marcadoresTec).forEach(m => mapa.removeLayer(m));
  marcadores = {}; marcadoresTec = {};

  // OS
  const _dataIni = document.getElementById('filtro-data-ini')?.value;
  const _dataFim = document.getElementById('filtro-data-fim')?.value;
  osCache.forEach(o => {
    const tipo = ASSUNTO_TIPO[o.id_assunto] || 'default';
    if (!filtrosStatus.has(o.status_hub) || !filtrosTipo.has(tipo)) return;
    if (_dataIni && o.data_abertura && o.data_abertura < _dataIni) return;
    if (_dataFim && o.data_abertura && o.data_abertura.substring(0,10) > _dataFim) return;
    if (!o.lat || !o.lon) return;
    const m = L.marker([o.lat, o.lon], {icon: iconeOS(o.status_hub, o.id_assunto, o.sla_estourado)})
      .addTo(mapa)
      .bindTooltip(`<b>OS #${o.ixc_os_id}</b><br>${o.cliente_nome}<br>${o.assunto_nome}`, {direction:'top'})
      .on('click', () => selecionarOS(o.ixc_os_id));
    marcadores[o.ixc_os_id] = m;
  });

  // Técnicos
  if (mostrarTecnicos) {
    tecnicosCache.forEach(t => {
      if (!t.lat || !t.lon) return;
      const m = L.marker([t.lat, t.lon], {icon: iconeTecnico(t.status_tecnico)})
        .addTo(mapa)
        .bindTooltip(`<b>${t.tecnico_nome}</b><br>${t.velocidade||0} km/h<br>${t.registrado_em||''}`, {direction:'top'})
        .on('click', () => mostrarDetalhesTecnico(t));
      marcadoresTec[t.id_tecnico] = m;
    });
  }
}

// ── SELECIONAR OS ─────────────────────────────────────────────
function selecionarOS(ixc_os_id) {
  const os = osCache.find(o=>o.ixc_os_id===ixc_os_id);
  if (!os) return;
  document.querySelectorAll('.os-item').forEach(i=>i.classList.remove('selected'));
  document.getElementById('osi-'+ixc_os_id)?.classList.add('selected');
  if (os.lat && os.lon) mapa.setView([os.lat, os.lon], 15);
  mostrarDetalhesOS(os);
}

function mostrarDetalhesOS(os) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = 'OS #'+os.ixc_os_id;
  document.getElementById('detail-body').innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:.95rem;margin-bottom:4px">${os.cliente_nome}</div>
      <div style="font-size:.82rem;color:var(--muted)">📍 ${os.endereco||'—'} ${os.bairro?'· '+os.bairro:''}</div>
      ${os.telefone?`<div style="font-size:.82rem;margin-top:4px">📞 ${os.telefone}</div>`:''}
    </div>
    <div style="margin-bottom:14px">
      <div class="detail-row"><label>Assunto</label><span>${os.assunto_nome||'—'}</span></div>
      <div class="detail-row"><label>Status</label><span>${labelStatus(os.status_hub)}</span></div>
      <div class="detail-row"><label>Técnico</label><span>${os.tecnico_nome||'Não atribuído'}</span></div>
      <div class="detail-row"><label>Abertura</label><span>${(os.data_abertura||'—').substring(0,16)}</span></div>
      ${os.data_agenda?`<div class="detail-row"><label>Agendada</label><span>${os.data_agenda.substring(0,16)}</span></div>`:''}
    </div>
    ${os.obs_abertura?`<div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:.8rem;color:var(--muted);margin-bottom:14px">${os.obs_abertura}</div>`:''}
    <div style="display:grid;gap:8px">
      ${os.status_hub==='pendente'?`<button class="btn btn-primary" style="width:100%" onclick="abrirAtribuir(${os.ixc_os_id})">👷 Atribuir técnico</button>`:''}
      ${os.lat&&os.lon?`<button class="btn btn-outline" style="width:100%" onclick="mapa.setView([${os.lat},${os.lon}],16)">📍 Centralizar no mapa</button>`:''}
    </div>`;
  panel.classList.add('open');
}

function mostrarDetalhesTecnico(t) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = t.tecnico_nome;
  const osAtivas = osCache.filter(o=>o.id_tecnico && o.tecnico_nome===t.tecnico_nome && o.status_hub!=='finalizada');
  document.getElementById('detail-body').innerHTML = `
    <div style="margin-bottom:14px">
      <div class="detail-row"><label>Status</label><span>${labelStatusTec(t.status_tecnico)}</span></div>
      <div class="detail-row"><label>Velocidade</label><span>${t.velocidade||0} km/h</span></div>
      <div class="detail-row"><label>Última pos.</label><span>${(t.registrado_em||'—').substring(0,16)}</span></div>
      <div class="detail-row"><label>OS ativas</label><span>${osAtivas.length}</span></div>
    </div>
    ${osAtivas.length?`
    <div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">OS em aberto</div>
    ${osAtivas.map(o=>`
      <div style="background:var(--surface2);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer" onclick="selecionarOS(${o.ixc_os_id})">
        <div style="font-size:.8rem;font-weight:700">OS #${o.ixc_os_id}</div>
        <div style="font-size:.75rem;color:var(--muted)">${o.cliente_nome} — ${labelStatus(o.status_hub)}</div>
      </div>`).join('')}`:''}`;
  panel.classList.add('open');
}

function fecharDetalhe() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.os-item').forEach(i=>i.classList.remove('selected'));
}

// ── ATRIBUIR OS ───────────────────────────────────────────────
async function abrirAtribuir(ixc_os_id) {
  osAtribuirId = ixc_os_id;
  const os = osCache.find(o=>o.ixc_os_id===ixc_os_id);
  document.getElementById('modal-os-info').innerHTML = `
    <b>OS #${ixc_os_id}</b> — ${os?.assunto_nome||'—'}<br>
    <span style="color:var(--muted)">${os?.cliente_nome} · ${os?.endereco||'—'}</span>`;
  try {
    const sugestoes = await api('/api/despacho/sugerir-tecnico/'+ixc_os_id);
    document.getElementById('lista-tecnicos-modal').innerHTML = sugestoes.map((t,i)=>`
      <div class="tecnico-option ${i===0?'best':''}" onclick="atribuirOS(${t.id})">
        <div>
          <div style="font-weight:700;font-size:.88rem">${i===0?'⭐ ':''} ${t.nome}</div>
          <div style="font-size:.75rem;color:var(--muted)">${t.distancia_km} km · ${t.os_ativas} OS ativas</div>
        </div>
        <button class="btn btn-sm btn-primary">Atribuir</button>
      </div>`).join('') || '<div style="color:var(--muted);font-size:.85rem">Nenhum técnico disponível</div>';
  } catch(e) {}
  document.getElementById('modal-atribuir').style.display = 'flex';
}

async function atribuirOS(id_tecnico) {
  await api('/api/os/'+osAtribuirId+'/atribuir',{method:'POST',body:JSON.stringify({id_tecnico})});
  fecharModal();
  fecharDetalhe();
  carregarDados();
  toast('OS atribuída com sucesso!','ok');
}

function fecharModal() { document.getElementById('modal-atribuir').style.display='none'; }

// ── FILTROS ───────────────────────────────────────────────────
let filtrosStatus = new Set(['pendente','deslocamento','agendada','reagendada','execucao']);
let filtrosTipo = new Set(['suporte','instalacao','infra','retirada','default']);
let mostrarTecnicos = true;

function toggleStatus(status, btn) {
  const todos = ['pendente','deslocamento','agendada','reagendada','execucao','finalizada'];
  if (filtrosStatus.has(status) && filtrosStatus.size === 1) {
    todos.forEach(t => filtrosStatus.add(t));
    document.querySelectorAll('[id^="f-"]:not(#f-tecnicos)').forEach(b => b.classList.add('active'));
    renderSidebar(); renderMapa();
    return;
  }
  if (filtrosStatus.size >= todos.length - 1) {
    filtrosStatus.clear();
    filtrosStatus.add(status);
    document.querySelectorAll('[id^="f-"]:not(#f-tecnicos)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSidebar(); renderMapa();
    return;
  }
  if (filtrosStatus.has(status)) filtrosStatus.delete(status);
  else filtrosStatus.add(status);
  btn.classList.toggle('active', filtrosStatus.has(status));
  renderSidebar(); renderMapa();
}

function toggleTipo(tipo, btn) {
  // Se clicou no unico ativo, ativa todos
  if (filtrosTipo.has(tipo) && filtrosTipo.size === 1) {
    ['suporte','instalacao','infra','retirada','default'].forEach(t => filtrosTipo.add(t));
    document.querySelectorAll('[id^="ft-"]').forEach(b => b.classList.add('active'));
    renderSidebar(); renderMapa();
    return;
  }
  // Se todos ativos, desativa todos e ativa so o clicado
  const todos = ['suporte','instalacao','infra','retirada','default'];
  if (filtrosTipo.size === todos.length) {
    filtrosTipo.clear();
    filtrosTipo.add(tipo);
    document.querySelectorAll('[id^="ft-"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSidebar(); renderMapa();
    return;
  }
  // Toggle normal
  if (filtrosTipo.has(tipo)) filtrosTipo.delete(tipo);
  else filtrosTipo.add(tipo);
  btn.classList.toggle('active', filtrosTipo.has(tipo));
  renderSidebar(); renderMapa();
}

function toggleTecnicos(btn) {
  mostrarTecnicos = !mostrarTecnicos;
  btn.classList.toggle('active', mostrarTecnicos);
  renderMapa();
}

function toggleFiltro(tipo, btn) {
  toggleStatus(tipo, btn);
}

// ── HELPERS ──────────────────────────────────────────────────
function labelStatus(s) {
  return {pendente:'🔴 Pendente',deslocamento:'🟡 Deslocamento',execucao:'🔵 Execução',finalizada:'✅ Finalizada'}[s]||s;
}
function labelStatusTec(s) {
  return {livre:'🅿️ Livre',em_rota:'🚗 Em rota',atendimento:'🔧 Em atendimento',offline:'📵 Offline'}[s]||s;
}

function limparDatas() {
  document.getElementById('filtro-data-ini').value = '';
  document.getElementById('filtro-data-fim').value = '';
  renderSidebar(); renderMapa();
}

function toast(msg, tipo='ok') {
  const t = document.createElement('div');
  t.className='toast '+tipo; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}
</script>
